<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex de Stats</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main>
      <h1>Pokédex de Stats</h1>

      <button id="botaoCarregar">Carregar Pokémon</button>

      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Tipo(s)</th>
            <th>HP</th>
            <th>Attack</th>
            <th>Defense</th>
            <th>Speed</th>
            <th>Total</th>
          </tr>
        </thead>

        <tbody id="tabelaPokemons"></tbody>
      </table>
    </main>
  </body>
</html>
